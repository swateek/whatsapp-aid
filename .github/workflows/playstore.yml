name: Play Store

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Show Flutter and Dart versions
        run: flutter --version

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/**/*.gradle', 'app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: whatsapp-aid-playstore-aab
          path: app/build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30
